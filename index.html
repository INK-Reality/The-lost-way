<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>晖纹竞技场 - 弃路余晖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: #0b0f17;
            color: #eaeaea;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: #161d2b;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 0 30px #000;
            border: 1px solid #323d52;
        }
        .title {
            text-align: center;
            font-size: 28px;
            color: #f5d042;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #f5d04266;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #444;
            background: #212938;
            color: white;
            font-size: 16px;
            outline: none;
        }
        button {
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin: 4px;
        }
        .btn-y { background: #f5d042; color: #111; }
        .btn-r { background: #e54a4a; color: white; }
        .btn-g { background: #3ba55d; color: white; }
        .btn-w { background: #374151; color: white; }
        .btn-block { width: 100%; margin: 6px 0; }
        .player-item {
            background: #242c3d;
            padding: 12px;
            border-radius: 8px;
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .hp-bar {
            width: 100%; height: 8px; background: #374151; border-radius: 4px; margin-top: 6px;
        }
        .hp-fill { height: 100%; background: #e54a4a; }
        .energy-bar {
            width: 100%; height: 6px; background: #374151; border-radius: 3px; margin-top: 4px;
        }
        .energy-fill { height: 100%; background: #3b82f6; }
        .action-row {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        .target-select {
            margin: 12px 0;
            padding: 12px;
            background: #1f2937;
            border-radius: 8px;
        }
        .log {
            background: #111827;
            padding: 14px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.5;
            max-height: 200px;
            overflow-y: auto;
            margin: 16px 0;
            color: #d1d5db;
        }
        .done { color: #10b981; font-weight: bold; }
        .waiting { color: #f59e0b; }
        .dead { color: #ef4444; text-decoration: line-through; }
        .winner { color: #f5d042; font-size: 22px; font-weight: bold; text-align: center; margin: 20px 0; }
    </style>
</head>
<body>

<div class="container" id="loginPage">
    <div class="title">晖纹竞技场</div>
    <input id="nick" placeholder="输入昵称">
    <input id="roomId" placeholder="房间号（加入填写）">
    <button class="btn-block btn-y" onclick="createRoom()">创建房间</button>
    <button class="btn-block btn-y" onclick="joinRoom()">加入房间</button>
    <div id="status" style="text-align:center; margin-top:10px; color:#f5d042;"></div>
</div>

<div class="container" id="roomPage" style="display:none;">
    <div class="title">房间：<span id="showRoom"></span></div>
    <div id="playerList"></div>
    <button class="btn-block btn-g" onclick="ready()">准备/取消</button>
    <button class="btn-block btn-r" id="startBtn" style="display:none;" onclick="startGame()">开始游戏</button>
</div>

<div class="container" id="battlePage" style="display:none;">
    <div class="title">战斗中</div>
    <div id="battlePlayers"></div>
    <div class="action-row" id="actionPanel" style="display:none;">
        <button class="btn-r" onclick="chooseAttack()">攻击</button>
        <button class="btn-w" onclick="chooseDefend()">防御</button>
        <button class="btn-g" onclick="chooseSkip()">跳过</button>
    </div>
    <div id="targetPanel" class="target-select" style="display:none;">
        <div>选择目标：</div>
        <div id="targetList"></div>
    </div>
    <div class="log" id="battleLog"></div>
    <div id="winner" class="winner" style="display:none;"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
let peer, myId, isHost = false, myNick, roomId;
let connections = [];
let players = [];
let readyList = {};

function $(id) { return document.getElementById(id); }

init();

function init() {
    peer = new Peer();
    peer.on('open', id => {
        myId = id;
        $('#status').innerText = '联机已就绪';
    });

    peer.on('connection', conn => {
        conn.on('open', () => {
            connections.push(conn);
            conn.on('data', onData);
        });
    });
}

function broadcast(data) {
    connections.forEach(c => {
        if (c.open) c.send(data);
    });
}

function onData(data) {
    switch (data.type) {
        case 'PLAYER_JOIN':
            if (isHost) {
                players.push(data.player);
                readyList[data.player.id] = false;
                broadcast({ type: 'SYNC', players, readyList });
            }
            break;
        case 'SYNC':
            players = data.players;
            readyList = data.readyList;
            renderRoom();
            break;
        case 'READY':
            readyList[data.id] = data.value;
            if (isHost) broadcast({ type: 'SYNC', players, readyList });
            renderRoom();
            break;
        case 'START':
            startBattle();
            break;
        case 'ACTION':
            if (isHost) {
                let p = players.find(x => x.id === data.id);
                if (p) p.act = data.act, p.tar = data.tar;
                broadcast({ type: 'SYNC_BATTLE', players });
                checkRound();
            }
            break;
        case 'SYNC_BATTLE':
            players = data.players;
            renderBattle();
            break;
        case 'ROUND_END':
            players = data.players;
            $('#battleLog').innerHTML = data.log + '<br><br>' + $('#battleLog').innerHTML;
            renderBattle();
            setTimeout(() => {
                players.forEach(p => { p.act = null; p.tar = null; });
                broadcast({ type: 'SYNC_BATTLE', players });
                renderBattle();
            }, 2500);
            break;
        case 'WIN':
            showWinner(data.winner);
            break;
    }
}

function createRoom() {
    myNick = $('#nick').value.trim();
    if (!myNick) { alert('请输入昵称'); return; }
    isHost = true;
    roomId = myId;
    players.push({
        id: myId, nick: myNick, hp:50, atk:8, df:5, en:0, maxEn:5, dead:false, act:null, tar:null
    });
    readyList[myId] = false;
    enterRoom();
}

function joinRoom() {
    myNick = $('#nick').value.trim();
    roomId = $('#roomId').value.trim();
    if (!myNick || !roomId) { alert('输入昵称和房间号'); return; }

    let conn = peer.connect(roomId);
    conn.on('open', () => {
        connections.push(conn);
        conn.on('data', onData);
        conn.send({
            type: 'PLAYER_JOIN',
            player: { id: myId, nick: myNick, hp:50, atk:8, df:5, en:0, maxEn:5, dead:false, act:null, tar:null }
        });
        enterRoom();
    });
}

function enterRoom() {
    $('#loginPage').style.display = 'none';
    $('#roomPage').style.display = 'block';
    $('#showRoom').innerText = roomId;
    $('#startBtn').style.display = isHost ? 'block' : 'none';
    renderRoom();
}

function ready() {
    readyList[myId] = !readyList[myId];
    if (isHost) {
        broadcast({ type: 'SYNC', players, readyList });
    } else {
        connections.forEach(c => c.send({ type: 'READY', id: myId, value: readyList[myId] }));
    }
    renderRoom();
}

function renderRoom() {
    $('#playerList').innerHTML = players.map(p => `
    <div class="player-item">
        <span>${p.nick}</span>
        <span>${readyList[p.id] ? '✅ 已准备' : '⌛ 未准备'}</span>
    </div>`).join('');
}

function startGame() {
    if (!isHost) return;
    broadcast({ type: 'START' });
    startBattle();
}

function startBattle() {
    $('#roomPage').style.display = 'none';
    $('#battlePage').style.display = 'block';
    renderBattle();
}

function renderBattle() {
    $('#battlePlayers').innerHTML = players.map(p => {
        let cls = p.dead ? 'dead' : p.act ? 'done' : 'waiting';
        let txt = p.dead ? '已阵亡' : p.act ? {a:'攻击',d:'防御',s:'跳过'}[p.act] : '等待';
        return `
        <div class="player-item ${cls}">
            <div>
                <b>${p.nick}</b>
                <div class="hp-bar"><div class="hp-fill" style="width:${p.hp/50*100}%"></div></div>
                <div style="font-size:12px;">HP:${p.hp} ATK:${p.atk} DF:${p.df} EN:${p.en}/${p.maxEn}</div>
            </div>
            <span>${txt}</span>
        </div>`;
    }).join('');

    let me = players.find(x => x.id === myId);
    $('#actionPanel').style.display = (!me.dead && !me.act) ? 'flex' : 'none';
    $('#targetPanel').style.display = 'none';
    checkWin();
}

function chooseAttack() {
    $('#actionPanel').style.display = 'none';
    $('#targetPanel').style.display = 'block';
    $('#targetList').innerHTML = players
        .filter(p => p.id !== myId && !p.dead)
        .map(p => `<button class="btn-block btn-r" onclick="submit('a','${p.id}')">${p.nick}</button>`).join('');
}
function chooseDefend() { submit('d', null); }
function chooseSkip() { submit('s', null); }

function submit(act, tar) {
    let me = players.find(x => x.id === myId);
    me.act = act;
    me.tar = tar;
    connections.forEach(c => c.send({ type: 'ACTION', id: myId, act, tar }));
    renderBattle();
}

function checkRound() {
    if (!isHost) return;
    let alive = players.filter(p => !p.dead);
    if (alive.every(p => p.act)) resolveRound();
}

function resolveRound() {
    let dmg = {}; players.forEach(p => dmg[p.id] = 0);
    players.forEach(p => { if (p.act === 'a' && p.tar) dmg[p.tar] += p.atk; });

    let log = ['--- 回合结算 ---'];
    players.forEach(p => {
        if (p.dead) return;
        let t = p.tar ? players.find(x => x.id === p.tar) : null;
        if (p.act === 'a') log.push(`${p.nick} 攻击 ${t?.nick}`);
        if (p.act === 'd') log.push(`${p.nick} 防御`);
        if (p.act === 's') { p.en = Math.min(p.en+1,5); log.push(`${p.nick} 跳过，能量+1`); }
    });
    players.forEach(p => {
        if (p.dead) return;
        let v = p.act === 'd' ? Math.max(0, dmg[p.id]-p.df) : dmg[p.id];
        p.hp -= v;
        if (v>0) log.push(`${p.nick} 受到 ${v} 点伤害`);
        if (p.hp <= 0) { p.hp=0; p.dead=true; log.push(`${p.nick} 已阵亡！`); }
    });

    broadcast({ type: 'ROUND_END', players, log: log.join('<br>') });
    renderBattle();
}

function checkWin() {
    let alive = players.filter(p => !p.dead);
    if (alive.length === 1) {
        broadcast({ type: 'WIN', winner: alive[0].nick });
        showWinner(alive[0].nick);
    }
}

function showWinner(name) {
    $('#winner').style.display = 'block';
    $('#winner').innerText = `🎉 ${name} 获得胜利！`;
}
</script>
</body>
</html>

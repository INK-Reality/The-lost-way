<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>晖纹竞技场 - 弃路余晖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", system-ui, sans-serif;
        }
        body {
            background: #0a0d14;
            color: #e6e6e6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 720px;
            background: #141a26;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border: 1px solid #2d3748;
        }
        .title {
            text-align: center;
            font-size: 32px;
            color: #f6e05e;
            margin-bottom: 24px;
            text-shadow: 0 0 12px rgba(246,224,94,0.3);
        }
        .input-group {
            margin-bottom: 16px;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 8px;
            border: 1px solid #374151;
            background: #1f2937;
            color: #f9fafb;
            font-size: 16px;
            outline: none;
            transition: border 0.2s;
        }
        input:focus {
            border-color: #f6e05e;
        }
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }
        button {
            padding: 14px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #f6e05e;
            color: #111827;
        }
        .btn-primary:hover {
            background: #fcd34d;
            transform: translateY(-2px);
        }
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        .btn-danger:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }
        .status {
            text-align: center;
            color: #f6e05e;
            font-size: 14px;
            margin-top: 8px;
        }
        .player-list {
            margin: 20px 0;
        }
        .player-item {
            background: #1f2937;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .ready-tag {
            color: #10b981;
            font-weight: bold;
        }
        .unready-tag {
            color: #f59e0b;
            font-weight: bold;
        }
        .battle-ui {
            display: none;
        }
        .battle-player {
            background: #1f2937;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 12px;
        }
        .hp-bar {
            width: 100%;
            height: 12px;
            background: #374151;
            border-radius: 6px;
            overflow: hidden;
            margin-top: 8px;
        }
        .hp-fill {
            height: 100%;
            background: #ef4444;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <!-- 登录页 -->
    <div class="container" id="loginPage">
        <h1 class="title">晖纹竞技场</h1>
        <div class="input-group">
            <input type="text" id="nickname" placeholder="输入你的游戏昵称（必填）">
        </div>
        <div class="input-group">
            <input type="text" id="roomId" placeholder="房间号（创建房间自动生成）">
        </div>
        <div class="btn-group">
            <button class="btn-primary" onclick="createRoom()">创建房间</button>
            <button class="btn-primary" onclick="joinRoom()">加入房间</button>
        </div>
        <div class="status" id="loginStatus">等待操作...</div>
    </div>

    <!-- 房间等待页 -->
    <div class="container" id="roomPage" style="display: none;">
        <h1 class="title">房间号：<span id="currentRoomId"></span></h1>
        <div class="player-list" id="playerList"></div>
        <div class="btn-group">
            <button class="btn-primary" id="readyBtn" onclick="toggleReady()">准备/取消准备</button>
            <button class="btn-danger" id="startBtn" style="display: none;" onclick="startGame()">开始游戏（房主）</button>
        </div>
        <div class="status" id="roomStatus">等待玩家加入...</div>
    </div>

    <!-- 战斗页 -->
    <div class="container battle-ui" id="battlePage">
        <h1 class="title">战斗中</h1>
        <div id="battlePlayerList"></div>
        <div class="status">回合制战斗系统开发中...</div>
    </div>

    <!-- PeerJS 核心 -->
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
        // 全局状态
        let myPeer = null;
        let myId = null;
        let roomId = null;
        let isHost = false;
        let myNick = "";
        let isReady = false;
        let connections = [];
        let players = []; // { id, nick, ready, hp:80, atk:5, def:5 }

        // DOM 元素
        const loginPage = document.getElementById('loginPage');
        const roomPage = document.getElementById('roomPage');
        const battlePage = document.getElementById('battlePage');
        const currentRoomIdEl = document.getElementById('currentRoomId');
        const playerListEl = document.getElementById('playerList');
        const battlePlayerListEl = document.getElementById('battlePlayerList');
        const startBtn = document.getElementById('startBtn');
        const loginStatusEl = document.getElementById('loginStatus');
        const roomStatusEl = document.getElementById('roomStatus');

        // 初始化 Peer
        function initPeer() {
            myPeer = new Peer();
            myPeer.on('open', (id) => {
                myId = id;
                loginStatusEl.textContent = "联机服务已就绪，可以创建/加入房间";
            });
            myPeer.on('connection', (conn) => {
                handleConnection(conn);
            });
            myPeer.on('error', (err) => {
                console.error(err);
                loginStatusEl.textContent = "联机服务异常：" + err.type;
            });
        }

        // 处理新连接
        function handleConnection(conn) {
            connections.push(conn);
            conn.on('data', (data) => handleData(data, conn));
            conn.on('close', () => {
                connections = connections.filter(c => c !== conn);
                players = players.filter(p => p.id !== conn.peer);
                updatePlayerList();
            });
            // 发送自己的信息给新连接
            conn.send({
                type: 'playerInfo',
                id: myId,
                nick: myNick,
                ready: isReady,
                hp: 80,
                atk: 5,
                def: 5
            });
        }

        // 处理收到的数据
        function handleData(data, conn) {
            switch(data.type) {
                case 'playerInfo':
                    const existing = players.find(p => p.id === data.id);
                    if (existing) {
                        Object.assign(existing, data);
                    } else {
                        players.push(data);
                    }
                    updatePlayerList();
                    break;
                case 'readyUpdate':
                    const p = players.find(pl => pl.id === data.id);
                    if (p) p.ready = data.ready;
                    updatePlayerList();
                    break;
                case 'startGame':
                    roomPage.style.display = 'none';
                    battlePage.style.display = 'block';
                    updateBattleUI();
                    break;
            }
        }

        // 广播给所有连接
        function broadcast(data) {
            connections.forEach(conn => conn.send(data));
        }

        // 创建房间
        function createRoom() {
            myNick = document.getElementById('nickname').value.trim();
            if (!myNick) {
                alert("请输入昵称！");
                return;
            }
            isHost = true;
            roomId = myId; // 用 Peer ID 当房间号
            currentRoomIdEl.textContent = roomId;
            players.push({
                id: myId,
                nick: myNick,
                ready: false,
                hp: 80,
                atk: 5,
                def: 5
            });
            loginPage.style.display = 'none';
            roomPage.style.display = 'block';
            startBtn.style.display = 'block';
            roomStatusEl.textContent = "等待其他玩家加入...";
            updatePlayerList();
        }

        // 加入房间
        function joinRoom() {
            myNick = document.getElementById('nickname').value.trim();
            roomId = document.getElementById('roomId').value.trim();
            if (!myNick || !roomId) {
                alert("请输入昵称和房间号！");
                return;
            }
            const conn = myPeer.connect(roomId);
            conn.on('open', () => {
                handleConnection(conn);
                // 发送自己的信息
                conn.send({
                    type: 'playerInfo',
                    id: myId,
                    nick: myNick,
                    ready: false,
                    hp: 80,
                    atk: 5,
                    def: 5
                });
                players.push({
                    id: myId,
                    nick: myNick,
                    ready: false,
                    hp: 80,
                    atk: 5,
                    def: 5
                });
                loginPage.style.display = 'none';
                roomPage.style.display = 'block';
                currentRoomIdEl.textContent = roomId;
                roomStatusEl.textContent = "已加入房间，等待房主开始...";
                updatePlayerList();
            });
            conn.on('error', (err) => {
                alert("加入房间失败：" + err.message);
            });
        }

        // 切换准备状态
        function toggleReady() {
            isReady = !isReady;
            const me = players.find(p => p.id === myId);
            if (me) me.ready = isReady;
            broadcast({
                type: 'readyUpdate',
                id: myId,
                ready: isReady
            });
            updatePlayerList();
        }

        // 开始游戏
        function startGame() {
            if (!isHost) return;
            // 检查所有玩家是否准备
            const allReady = players.every(p => p.ready);
            if (!allReady) {
                alert("还有玩家未准备！");
                return;
            }
            broadcast({ type: 'startGame' });
            roomPage.style.display = 'none';
            battlePage.style.display = 'block';
            updateBattleUI();
        }

        // 更新房间玩家列表
        function updatePlayerList() {
            playerListEl.innerHTML = players.map(p => `
                <div class="player-item">
                    <span>${p.nick}</span>
                    <span class="${p.ready ? 'ready-tag' : 'unready-tag'}">${p.ready ? '✅ 已准备' : '⌛ 未准备'}</span>
                </div>
            `).join('');
        }

        // 更新战斗UI
        function updateBattleUI() {
            battlePlayerListEl.innerHTML = players.map(p => `
                <div class="battle-player">
                    <div style="display: flex; justify-content: space-between;">
                        <span style="font-weight: bold; font-size: 18px;">${p.nick}</span>
                        <span>血量: ${p.hp} | 攻击: ${p.atk} | 防御: ${p.def}</span>
                    </div>
                    <div class="hp-bar">
                        <div class="hp-fill" style="width: ${p.hp / 80 * 100}%"></div>
                    </div>
                </div>
            `).join('');
        }

        // 页面加载完成初始化
        window.onload = initPeer;
    </script>
</body>
</html>

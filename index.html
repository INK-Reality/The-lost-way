<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>晖纹竞技场 - 弃路余晖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: #0b0f17;
            color: #eaeaea;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: #161d2b;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 0 30px #000;
            border: 1px solid #323f57;
        }
        .title {
            text-align: center;
            font-size: 28px;
            color: #f5d042;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #f5d04266;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #444;
            background: #212938;
            color: white;
            font-size: 16px;
            outline: none;
        }
        button {
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin: 4px;
        }
        .btn-y { background: #f5d042; color: #111; }
        .btn-r { background: #e54a4a; color: white; }
        .btn-g { background: #3ba55d; color: white; }
        .btn-w { background: #374151; color: white; }
        .btn-block { width: 100%; margin: 6px 0; }
        .player-item {
            background: #242c3d;
            padding: 12px;
            border-radius: 8px;
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .hp-bar {
            width: 100%; height: 8px; background: #374151; border-radius: 4px; margin-top: 6px;
        }
        .hp-fill { height: 100%; background: #e54a4a; }
        .energy-bar {
            width: 100%; height: 6px; background: #374151; border-radius: 3px; margin-top: 4px;
        }
        .energy-fill { height: 100%; background: #3b82f6; }
        .action-row {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        .target-select {
            margin: 12px 0;
            padding: 12px;
            background: #1f2937;
            border-radius: 8px;
        }
        .log {
            background: #111827;
            padding: 14px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.5;
            max-height: 200px;
            overflow-y: auto;
            margin: 16px 0;
            color: #d1d5db;
        }
        .done { color: #10b981; font-weight: bold; }
        .waiting { color: #f59e0b; }
        .dead { color: #ef4444; text-decoration: line-through; }
        .winner { color: #f5d042; font-size: 22px; font-weight: bold; text-align: center; margin: 20px 0; }
    </style>
</head>
<body>

<div class="container" id="loginPage">
    <div class="title">晖纹竞技场</div>
    <input id="nick" placeholder="输入昵称">
    <input id="roomId" placeholder="房间号（加入填写）">
    <button class="btn-block btn-y" onclick="createRoom()">创建房间</button>
    <button class="btn-block btn-y" onclick="joinRoom()">加入房间</button>
    <div id="status" style="text-align:center; margin-top:10px; color:#f5d042;"></div>
</div>

<div class="container" id="roomPage" style="display:none;">
    <div class="title">房间：<span id="showRoom"></span></div>
    <div id="playerList"></div>
    <button class="btn-block btn-g" id="readyBtn" onclick="ready()">准备/取消</button>
    <button class="btn-block btn-r" id="startBtn" style="display:none;" onclick="startGame()">开始游戏</button>
</div>

<div class="container" id="battlePage" style="display:none;">
    <div class="title">战斗中</div>
    <div id="battlePlayers"></div>
    <div class="action-row" id="actionPanel" style="display:none;">
        <button class="btn-r" onclick="chooseAttack()">攻击</button>
        <button class="btn-w" onclick="chooseDefend()">防御</button>
        <button class="btn-g" onclick="chooseSkip()">跳过</button>
    </div>
    <div id="targetPanel" class="target-select" style="display:none;">
        <div>选择目标：</div>
        <div id="targetList"></div>
    </div>
    <div class="log" id="battleLog"></div>
    <div id="winner" class="winner" style="display:none;"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
let peer, myId, roomId, isHost = false, myNick;
let conns = [];
let players = [];
let readyMap = {};
let roundActions = {};

function $(id) { return document.getElementById(id); }

function initPeer() {
    peer = new Peer();
    peer.on('open', id => {
        myId = id;
        $("status").innerText = "联机已连接";
    });
    peer.on('connection', conn => {
        conn.on('open', () => {
            conns.push(conn);
            conn.on('data', data => handleMessage(data, conn));
        });
    });
}

function sendToHost(data) {
    if (isHost) return;
    conns.forEach(c => c.open && c.send(data));
}

function broadcast(data) {
    conns.forEach(c => c.open && c.send(data));
}

function handleMessage(data, conn) {
    switch (data.type) {
        case "PLAYER_JOIN":
            if (isHost) {
                players.push(data.player);
                readyMap[data.player.id] = false;
                broadcast({ type: "ROOM_SYNC", players, readyMap });
            }
            break;

        case "PLAYER_READY":
            readyMap[data.id] = data.ready;
            if (isHost) broadcast({ type: "ROOM_SYNC", players, readyMap });
            break;

        case "ROOM_SYNC":
            players = data.players;
            readyMap = data.readyMap;
            renderRoom();
            break;

        case "GAME_START":
            startBattle();
            break;

        case "ACTION_SUBMIT":
            if (isHost) {
                let p = players.find(x => x.id === data.id);
                if (p) {
                    p.act = data.act;
                    p.tar = data.tar;
                    roundActions[data.id] = { act: data.act, tar: data.tar };
                    broadcast({ type: "PLAYER_SYNC", players });
                    checkAllSubmitted();
                }
            }
            break;

        case "PLAYER_SYNC":
            players = data.players;
            renderBattle();
            break;

        case "ROUND_RESULT":
            players = data.players;
            $("battleLog").innerHTML = data.log + "<br><br>" + $("battleLog").innerHTML;
            renderBattle();
            setTimeout(() => {
                players.forEach(p => { p.act = null; p.tar = null; });
                roundActions = {};
                broadcast({ type: "PLAYER_SYNC", players });
                renderBattle();
            }, 2600);
            break;

        case "GAME_WIN":
            showWinner(data.winner);
            break;
    }
}

function createRoom() {
    myNick = $("nick").value.trim();
    if (!myNick) return alert("请输入昵称");
    isHost = true;
    roomId = myId;
    players.push({
        id: myId, nick: myNick, hp: 50, atk: 8, df: 5, en: 0, maxEn: 5, dead: false, act: null, tar: null
    });
    readyMap[myId] = false;
    enterRoom();
}

function joinRoom() {
    myNick = $("nick").value.trim();
    roomId = $("roomId").value.trim();
    if (!myNick || !roomId) return alert("输入昵称和房间号");
    let conn = peer.connect(roomId);
    conn.on('open', () => {
        conns.push(conn);
        conn.on('data', d => handleMessage(d, conn));
        conn.send({
            type: "PLAYER_JOIN",
            player: { id: myId, nick: myNick, hp: 50, atk: 8, df: 5, en: 0, maxEn: 5, dead: false, act: null, tar: null }
        });
    });
}

function enterRoom() {
    $("loginPage").style.display = "none";
    $("roomPage").style.display = "block";
    $("showRoom").innerText = roomId;
    if (isHost) $("startBtn").style.display = "block";
    renderRoom();
}

function ready() {
    readyMap[myId] = !readyMap[myId];
    if (isHost) {
        broadcast({ type: "PLAYER_READY", id: myId, ready: readyMap[myId] });
    } else {
        sendToHost({ type: "PLAYER_READY", id: myId, ready: readyMap[myId] });
    }
    renderRoom();
}

function startGame() {
    if (!isHost) return;
    broadcast({ type: "GAME_START" });
    startBattle();
}

function startBattle() {
    $("roomPage").style.display = "none";
    $("battlePage").style.display = "block";
    renderBattle();
}

function renderRoom() {
    $("playerList").innerHTML = players.map(p => `
    <div class="player-item">
        <span>${p.nick}</span>
        <span>${readyMap[p.id] ? "✅ 已准备" : "⌛ 未准备"}</span>
    </div>`).join('');
}

function renderBattle() {
    $("battlePlayers").innerHTML = players.map(p => {
        let cls = p.dead ? "dead" : p.act ? "done" : "waiting";
        let txt = p.dead ? "已阵亡" : p.act ? { a:"攻击",d:"防御",s:"跳过" }[p.act] : "等待";
        return `
        <div class="player-item ${cls}">
            <div>
                <b>${p.nick}</b>
                <div class="hp-bar"><div class="hp-fill" style="width:${p.hp/50*100}%"></div></div>
                <div style="font-size:12px;">HP:${p.hp} ATK:${p.atk} DF:${p.df} EN:${p.en}/${p.maxEn}</div>
            </div>
            <span>${txt}</span>
        </div>`;
    }).join('');

    let me = players.find(x => x.id === myId);
    if (!me.dead && !me.act) {
        $("actionPanel").style.display = "flex";
    } else {
        $("actionPanel").style.display = "none";
        $("targetPanel").style.display = "none";
    }

    checkWin();
}

function chooseAttack() {
    $("actionPanel").style.display = "none";
    $("targetPanel").style.display = "block";
    $("targetList").innerHTML = players
        .filter(p => p.id !== myId && !p.dead)
        .map(p => `<button class="btn-block btn-r" onclick="selectTarget('${p.id}')">${p.nick}</button>`)
        .join('');
}

function chooseDefend() { submitAction("d", null); }
function chooseSkip() { submitAction("s", null); }
function selectTarget(t) { $("targetPanel").style.display = "none"; submitAction("a", t); }

function submitAction(act, tar) {
    let me = players.find(x => x.id === myId);
    me.act = act;
    me.tar = tar;

    sendToHost({
        type: "ACTION_SUBMIT",
        id: myId,
        act: act,
        tar: tar
    });

    renderBattle();
}

function checkAllSubmitted() {
    if (!isHost) return;
    let alive = players.filter(p => !p.dead);
    let done = alive.every(p => p.act);
    if (done) resolveRound();
}

function resolveRound() {
    let damage = {};
    players.forEach(p => damage[p.id] = 0);
    players.forEach(p => {
        if (p.act === "a" && p.tar) damage[p.tar] += p.atk;
    });

    let logs = ["--- 回合结算 ---"];

    players.forEach(p => {
        if (p.dead) return;
        let t = p.tar ? players.find(x => x.id === p.tar) : null;
        if (p.act === "a") logs.push(`${p.nick} 攻击 ${t?.nick}`);
        if (p.act === "d") logs.push(`${p.nick} 防御`);
        if (p.act === "s") { p.en = Math.min(p.en+1,5); logs.push(`${p.nick} 跳过，能量+1`); }
    });

    players.forEach(p => {
        if (p.dead) return;
        let d = 0;
        if (p.act === "d") d = Math.max(0, damage[p.id] - p.df);
        else d = damage[p.id];
        p.hp -= d;
        if (d > 0) logs.push(`${p.nick} 受到 ${d} 点伤害`);
        if (p.hp <= 0) { p.hp=0; p.dead=true; logs.push(`${p.nick} 已阵亡！`); }
    });

    broadcast({
        type: "ROUND_RESULT",
        players,
        log: logs.join("<br>")
    });

    renderBattle();
    checkWin();
}

function checkWin() {
    let alive = players.filter(p => !p.dead);
    if (alive.length === 1) {
        broadcast({ type: "GAME_WIN", winner: alive[0].nick });
        showWinner(alive[0].nick);
    }
}

function showWinner(w) {
    $("winner").style.display = "block";
    $("winner").innerText = `🎉 ${w} 获得胜利！`;
}

window.onload = initPeer;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>晖纹竞技场 - 弃路余晖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: #0b0f17;
            color: #eaeaea;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: #161d2b;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 0 30px #000;
            border: 1px solid #323f57;
        }
        .title {
            text-align: center;
            font-size: 28px;
            color: #f5d042;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #f5d04266;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #444;
            background: #212938;
            color: white;
            font-size: 16px;
            outline: none;
        }
        button {
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin: 4px;
        }
        .btn-y { background: #f5d042; color: #111; }
        .btn-r { background: #e54a4a; color: white; }
        .btn-g { background: #3ba55d; color: white; }
        .btn-w { background: #374151; color: white; }
        .btn-block { width: 100%; margin: 6px 0; }
        .player-item {
            background: #242c3d;
            padding: 12px;
            border-radius: 8px;
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .hp-bar {
            width: 100%; height: 8px; background: #374151; border-radius: 4px; margin-top: 6px;
        }
        .hp-fill { height: 100%; background: #e54a4a; }
        .energy-bar {
            width: 100%; height: 6px; background: #374151; border-radius: 3px; margin-top: 4px;
        }
        .energy-fill { height: 100%; background: #3b82f6; }
        .action-row {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        .target-select {
            margin: 12px 0;
            padding: 12px;
            background: #1f2937;
            border-radius: 8px;
        }
        .log {
            background: #111827;
            padding: 14px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.5;
            max-height: 200px;
            overflow-y: auto;
            margin: 16px 0;
            color: #d1d5db;
        }
        .done { color: #10b981; font-weight: bold; }
        .waiting { color: #f59e0b; }
        .dead { color: #ef4444; text-decoration: line-through; }
        .winner { color: #f5d042; font-size: 22px; font-weight: bold; text-align: center; margin: 20px 0; }
    </style>
</head>
<body>

<div class="container" id="loginPage">
    <div class="title">晖纹竞技场</div>
    <input id="nick" placeholder="输入昵称">
    <input id="roomId" placeholder="房间号（加入填写）">
    <button class="btn-block btn-y" onclick="createRoom()">创建房间</button>
    <button class="btn-block btn-y" onclick="joinRoom()">加入房间</button>
    <div id="status" style="text-align:center; margin-top:10px; color:#f5d042;"></div>
</div>

<div class="container" id="roomPage" style="display:none;">
    <div class="title">房间：<span id="showRoom"></span></div>
    <div id="playerList"></div>
    <button class="btn-block btn-g" id="readyBtn" onclick="ready()">准备/取消</button>
    <button class="btn-block btn-r" id="startBtn" style="display:none;" onclick="startGame()">开始游戏</button>
</div>

<div class="container" id="battlePage" style="display:none;">
    <div class="title">战斗中</div>
    <div id="battlePlayers"></div>
    <div class="action-row" id="actionPanel" style="display:none;">
        <button class="btn-r" onclick="chooseAttack()">攻击</button>
        <button class="btn-w" onclick="chooseDefend()">防御</button>
        <button class="btn-g" onclick="chooseSkip()">跳过</button>
    </button>
    </div>
    <div id="targetPanel" class="target-select" style="display:none;">
        <div>选择目标：</div>
        <div id="targetList"></div>
    </div>
    <div class="log" id="battleLog"></div>
    <div id="winner" class="winner" style="display:none;"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
let peer, myId, roomId, isHost = false, myNick;
let conns = [];
let players = [];
let readyMap = {};
let actions = {};
let phase = "login"; // login, room, battle, round, resolve, end

function $(id) { return document.getElementById(id); }

function initPeer() {
    peer = new Peer();
    peer.on('open', id => { myId = id; });
    peer.on('connection', conn => {
        conns.push(conn);
        conn.on('data', d => recv(d, conn));
    });
}

function sendAll(data) { conns.forEach(c => c.send(data)); }

function recv(data, conn) {
    switch(data.t) {
        case 'join':
            players.push(data.p);
            readyMap[data.p.id] = false;
            syncPlayers(); break;
        case 'ready':
            readyMap[data.id] = data.v;
            syncPlayers(); break;
        case 'start':
            startBattle(); break;
        case 'act':
            actions[data.id] = data.a;
            syncActions(); break;
        case 'sync':
            players = data.players;
            actions = data.actions;
            syncBattle(); break;
        case 'resolve':
            players = data.players;
            phase = 'resolve';
            syncBattle();
            setTimeout(nextRound, 2500); break;
        case 'win':
            showWinner(data.w); break;
    }
}

function createRoom() {
    myNick = $('nick').value.trim();
    if (!myNick) return alert('输入昵称');
    isHost = true;
    roomId = myId;
    players.push({ id: myId, nick: myNick, hp:50, atk:8, df:5, en:0, maxEn:5, dead:false, act:null, tar:null });
    readyMap[myId] = false;
    enterRoom();
}

function joinRoom() {
    myNick = $('nick').value.trim();
    roomId = $('roomId').value.trim();
    if (!myNick || !roomId) return alert('昵称+房间号');
    let conn = peer.connect(roomId);
    conn.on('open', () => {
        conns.push(conn);
        conn.on('data', d => recv(d, conn));
        let p = { id: myId, nick: myNick, hp:50, atk:8, df:5, en:0, maxEn:5, dead:false, act:null, tar:null };
        players.push(p);
        conn.send({t:'join', p:p});
        enterRoom();
    });
}

function enterRoom() {
    $('loginPage').style.display='none'; $('roomPage').style.display='block';
    $('showRoom').innerText = roomId;
    if (isHost) $('startBtn').style.display='block';
    syncPlayers();
}

function ready() {
    readyMap[myId] = !readyMap[myId];
    sendAll({t:'ready', id:myId, v:readyMap[myId]});
    syncPlayers();
}

function startGame() {
    if (!isHost) return;
    sendAll({t:'start'});
    startBattle();
}

function startBattle() {
    phase = 'round';
    $('roomPage').style.display='none'; $('battlePage').style.display='block';
    syncBattle();
}

function syncPlayers() {
    let html = '';
    players.forEach(p => {
        let r = readyMap[p.id] ? '✅ 已准备' : '⌛ 未准备';
        html += `<div class="player-item"><span>${p.nick}</span><span>${r}</span></div>`;
    });
    $('playerList').innerHTML = html;
}

function syncBattle() {
    let html = '';
    players.forEach(p => {
        let cls = p.dead ? 'dead' : (p.act ? 'done' : 'waiting');
        let actTxt = p.act ? {a:'攻击',d:'防御',s:'跳过'}[p.act] : '等待';
        if (p.dead) actTxt = '已阵亡';
        html += `
        <div class="player-item ${cls}">
            <div>
                <b>${p.nick}</b>
                <div class="hp-bar"><div class="hp-fill" style="width:${p.hp/50*100}%"></div></div>
                <div style="font-size:12px;">HP:${p.hp} ATK:${p.atk} DF:${p.df} EN:${p.en}/${p.maxEn}</div>
            </div>
            <div>${actTxt}</div>
        </div>`;
    });
    $('battlePlayers').innerHTML = html;
    if (phase === 'round' && !me().dead && !me().act) {
        $('actionPanel').style.display = 'flex';
    } else {
        $('actionPanel').style.display = 'none';
    }
    checkWinner();
}

function syncActions() {
    players.forEach(p => p.act = actions[p.id]?.a || null);
    syncBattle();
    if (isHost) checkAllDone();
}

function me() { return players.find(x=>x.id===myId); }

function chooseAttack() {
    $('actionPanel').style.display='none';
    $('targetPanel').style.display='block';
    let alive = players.filter(p=>!p.dead && p.id!==myId);
    $('targetList').innerHTML = alive.map(p=>`
        <button class="btn-block btn-r" onclick="setTarget('${p.id}')">${p.nick}</button>
    `).join('');
}

function chooseDefend() { sendAction('d', null); }
function chooseSkip() { sendAction('s', null); }
function setTarget(tid) { sendAction('a', tid); }

function sendAction(a, tar) {
    $('targetPanel').style.display='none';
    let me = me();
    me.act = a; me.tar = tar;
    actions[myId] = {a, tar};
    sendAll({t:'act', id:myId, a:{a,tar}});
    if (isHost) sendAll({t:'sync', players, actions});
    syncBattle();
}

function checkAllDone() {
    let alive = players.filter(p=>!p.dead);
    let done = alive.every(p=>actions[p.id]?.a);
    if (done) resolveRound();
}

function resolveRound() {
    phase = 'resolve';
    let log = [];
    let alive = players.filter(p=>!p.dead);

    let damageMap = {};
    alive.forEach(p => damageMap[p.id] = 0);

    alive.forEach(p => {
        let a = actions[p.id]?.a;
        let t = actions[p.id]?.tar;
        if (a === 'a' && t) {
            damageMap[t] += p.atk;
        }
    });

    alive.forEach(p => {
        let a = actions[p.id]?.a;
        if (a === 'd') {
            let dmg = Math.max(0, damageMap[p.id] - p.df);
            p.hp -= dmg;
            log.push(`${p.nick} 防御，受到 ${dmg} 伤害`);
        } else if (a === 's') {
            p.en = Math.min(p.en+1, p.maxEn);
            log.push(`${p.nick} 跳过，能量+1`);
        } else {
            let dmg = damageMap[p.id];
            p.hp -= dmg;
            log.push(`${p.nick} 受到 ${dmg} 点伤害`);
        }
        if (p.hp <= 0) {
            p.hp = 0; p.dead = true;
            log.push(`${p.nick} 已阵亡！`);
        }
    });

    actions = {};
    players.forEach(p => { p.act = null; p.tar = null; });
    sendAll({t:'resolve', players});
    showLog(log);
    checkWinner();
}

function nextRound() {
    phase = 'round';
    actions = {};
    players.forEach(p => { p.act = null; p.tar = null; });
    sendAll({t:'sync', players, actions});
    syncBattle();
}

function showLog(arr) {
    $('battleLog').innerHTML = arr.join('<br>');
}

function checkWinner() {
    let alive = players.filter(p=>!p.dead);
    if (alive.length === 1) {
        let w = alive[0].nick;
        if (isHost) sendAll({t:'win', w});
        showWinner(w);
    }
}

function showWinner(w) {
    phase = 'end';
    $('winner').style.display='block';
    $('winner').innerText = `🎉 ${w} 获得胜利！`;
}

window.onload = initPeer;
</script>
</body>
</html>

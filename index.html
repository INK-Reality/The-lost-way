<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>晖纹竞技场 - 弃路余晖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: #10141c;
            color: #e6e6e6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: #1b2230;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 0 30px #000;
            border: 1px solid #3a455a;
        }

        .title {
            text-align: center;
            font-size: 28px;
            color: #f1c40f;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #f1c40f55;
        }

        .input-group {
            margin: 12px 0;
        }

        input {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: none;
            background: #252d3a;
            color: white;
            font-size: 16px;
            outline: none;
            border: 1px solid #444;
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: none;
            background: #d4af37;
            color: #111;
            font-weight: bold;
            font-size: 16px;
            margin: 8px 0;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #ffcc33;
        }

        .room {
            background: #222b38;
            padding: 16px;
            border-radius: 10px;
            margin: 10px 0;
        }

        .player {
            padding: 10px;
            background: #2a3447;
            margin: 6px 0;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
        }

        .ready {
            color: #2ecc71;
            font-weight: bold;
        }

        .battle-ui {
            display: none;
        }

        .status {
            text-align: center;
            color: #ffcc33;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container" id="loginPage">
        <div class="title">晖纹竞技场</div>
        <div class="input-group">
            <input type="text" id="nickname" placeholder="输入你的游戏昵称">
        </div>
        <div class="input-group">
            <input type="text" id="roomId" placeholder="输入房间号（创建房间可不填）">
        </div>
        <button onclick="createRoom()">创建房间（4人）</button>
        <button onclick="joinRoom()">加入房间</button>
        <div class="status" id="tip"></div>
    </div>

    <div class="container" id="roomPage" style="display:none;">
        <div class="title">房间：<span id="showRoomId"></span></div>
        <div id="playerList"></div>
        <button id="readyBtn" onclick="ready()">准备 / 取消准备</button>
        <button id="startBtn" onclick="startBattle()" style="display:none;">开始游戏（房主）</button>
    </div>

    <div class="container battle-ui" id="battlePage">
        <div class="title">战斗中</div>
        <div id="battlePlayers"></div>
    </div>

    <script>
        let playerName = "";
        let roomId = "";
        let isHost = false;
        let players = [];
        let readyList = {};

        // 模拟联机（可替换为真实后端）
        function createRoom() {
            playerName = document.getElementById("nickname").value;
            if (!playerName) { alert("请输入昵称"); return; }
            roomId = Math.floor(Math.random()*9000)+1000;
            isHost = true;
            enterRoom();
        }

        function joinRoom() {
            playerName = document.getElementById("nickname").value;
            roomId = document.getElementById("roomId").value;
            if (!playerName || !roomId) { alert("请输入昵称和房间号"); return; }
            enterRoom();
        }

        function enterRoom() {
            document.getElementById("loginPage").style.display = "none";
            document.getElementById("roomPage").style.display = "block";
            document.getElementById("showRoomId").innerText = roomId;
            addPlayer(playerName);
            updatePlayerList();
        }

        function addPlayer(name) {
            if (!players.includes(name)) players.push(name);
        }

        function updatePlayerList() {
            let html = "";
            players.forEach(p => {
                let r = readyList[p] ? "✅ 已准备" : "⌛ 未准备";
                html += `<div class="player"><span>${p}</span><span class='ready'>${r}</span></div>`;
            });
            document.getElementById("playerList").innerHTML = html;
            if (isHost) document.getElementById("startBtn").style.display = "block";
        }

        function ready() {
            readyList[playerName] = !readyList[playerName];
            updatePlayerList();
        }

        function startBattle() {
            document.getElementById("roomPage").style.display = "none";
            document.getElementById("battlePage").style.display = "block";
            showBattle();
        }

        function showBattle() {
            let html = "";
            players.forEach(p => {
                html += `<div class='player'>${p} | 血量：80 | 攻击：5 | 防御：5</div>`;
            });
            document.getElementById("battlePlayers").innerHTML = html;
        }
    </script>
</body>
</html>
